<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- jQuery first -->
    <script src="js/jquery-3.6.3.min.js"></script>
    <!-- Bootstrap CSS and JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- AOS Animation Library -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Favicon sederhana -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />
    <title>Display Antrian - Melati Gold Shop</title>
    <style>
      :root {
        --gold-primary: #d4af37;
        --gold-secondary: #f9d776;
        --gold-light: #f8f0d7;
        --gold-dark: #9d7e2d;
        --dark-brown: #3a2c1c;
        --cream: #f9f5eb;
        --white: #ffffff;
        --black: #1a1a1a;
        --gray-light: #f5f5f5;
        --gray-medium: #e0e0e0;
        --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.1);
        --shadow-gold: 0 5px 15px rgba(212, 175, 55, 0.863);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--cream);
        color: var(--dark-brown);
        overflow-x: hidden;
        margin: 0;
        min-height: 100vh;
        padding-bottom: 100px; /* Memberikan ruang untuk footer */
        position: relative;
      }

      /* Header Styles */
      .header {
        background: linear-gradient(135deg, var(--gold-dark), var(--dark-brown));
        padding: 1rem 0;
        box-shadow: var(--shadow-soft);
        position: relative;
        z-index: 10;
      }

      .header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      }

      .logo-container {
        display: flex;
        align-items: center;
      }

      .logo {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--gold-primary);
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
      }

      .brand-name {
        margin-left: 1rem;
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 3rem;
        color: var(--white);
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
      }

      .brand-name a {
        color: var(--white);
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .brand-name a:hover {
        color: var(--gold-secondary);
      }

      .date-time {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        color: var(--white);
      }

      .current-date {
        font-size: 2rem;
        font-weight: 500;
        font-family: "Playfair Display", serif;
      }

      .current-time {
        font-size: 2rem;
        font-weight: 700;
        color: var(--gold-secondary);
      }

      .display-promosi {
        margin-left: 1rem;
      }

      .display-promosi a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        background: rgba(212, 175, 55, 0.2);
        border-radius: 50%;
        transition: all 0.3s ease;
        border: 2px solid rgba(212, 175, 55, 0.3);
      }

      /* Main Content Styles */
      main {
        padding: 0;
        min-height: calc(100vh - 200px);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .page-title {
        text-align: center;
        margin-bottom: 1rem;
        position: relative;
        padding-bottom: 1rem;
      }

      .page-title h1 {
        font-family: "roboto", serif;
        font-size: 4rem;
        font-weight: 700;
        color: var(--dark-brown);
        margin-bottom: 0;
      }

      .page-title::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      }

      /* Queue Cards */
      .queue-card {
        border-radius: 15px;
        overflow: hidden;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        width: 100%;
        height: clamp(250px, 55vh, 500px);
        border: none;
        position: relative;
        box-shadow: 0 20px 40px rgba(184, 152, 7, 0.63);
        display: flex;
        flex-direction: column;
      }

      .queue-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
      }

      .queue-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
      }

      .card-current::before {
        background: linear-gradient(90deg, var(--gold-secondary), var(--gold-dark));
      }

      .card-next::before {
        background: linear-gradient(90deg, var(--gold-dark), var(--gold-secondary));
      }

      /* Card Antrian Terlewat */
      .card-delayed::before {
        background: linear-gradient(90deg, #ff9800, #ff6d00);
      }

      .card-delayed .queue-card-header {
        background-color: #fff8e1;
        border-bottom-color: #ffcc02;
      }

      .card-delayed .queue-card-header h1 {
        color: var(--dark-brown);
      }

      .card-delayed .queue-number {
        color: var(--dark-brown);
      }

      .queue-card-header {
        background-color: var(--white);
        padding: 1rem;
        border-bottom: 1px solid var(--gray-medium);
      }

      .queue-card-header h1 {
        font-family: "Times New Roman", Times, serif;
        font-size: clamp(1.6rem, 2.6vw, 3.25rem);
        font-weight: bold;
        margin: 0;
        color: var(--dark-brown);
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      .queue-card-header h1 i {
        margin-right: 0.5rem;
        color: var(--gold-primary);
      }

      .queue-card-body {
        background-color: var(--white);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        flex: 1;
      }

      /* Styling untuk nomor antrian */
      .queue-number {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        color: var(--dark-brown);
        margin-bottom: 1rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: 100%;
        height: 100%;
        line-height: 1.1;
        word-wrap: break-word;
        overflow-wrap: break-word;
        transition: font-size 0.3s ease;
        font-size: clamp(4rem, 30vh, 20rem);
      }

      /* Garis bawah untuk nomor antrian */
      .queue-number::after {
        content: "";
        position: absolute;
        bottom: -1rem;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 3px;
        background: var(--gold-primary);
        border-radius: 3px;
      }

      .queue-label {
        font-size: 1.2rem;
        color: val(--dark-brown);
        text-align: center;
        margin: 0;
      }

      /* Gold Decorative Elements */
      .gold-decoration {
        position: absolute;
        opacity: 0.1;
        z-index: -1;
      }

      .gold-decoration.top-left {
        top: 10%;
        left: 5%;
        width: 200px;
        height: 200px;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23d4af37" d="M50,0 L100,50 L50,100 L0,50 Z"/></svg>');
        background-repeat: no-repeat;
        transform: rotate(15deg);
      }

      .gold-decoration.bottom-right {
        bottom: 10%;
        right: 5%;
        width: 250px;
        height: 250px;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle fill="%23d4af37" cx="50" cy="50" r="50"/></svg>');
        background-repeat: no-repeat;
        transform: rotate(-10deg);
      }

      /* Footer Styles */
      .footer {
        background: linear-gradient(135deg, var(--dark-brown), var(--gold-dark));
        color: var(--white);
        text-align: center;
        position: fixed;
        bottom: 0;
        width: 100%;
        z-index: 100;
      }

      .footer::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      }

      .footer p {
        font-family:
          playfair display,
          serif;
      }

      /* Animation for Queue Numbers */
      @keyframes numberPulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      .queue-number.active {
        animation: numberPulse 2s infinite;
        color: var(--gold-dark);
      }

      /* Shimmer Effect for Gold Elements */
      .gold-shimmer {
        position: relative;
        overflow: hidden;
      }

      .gold-shimmer::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.3) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: rotate(30deg);
        animation: shimmer 4s infinite;
      }

      /* Gold Border Effect */
      .gold-border {
        border: 1px solid var(--gold-primary);
        border-radius: 10px;
        padding: 1px;
        background:
          linear-gradient(var(--white), var(--white)) padding-box,
          linear-gradient(45deg, var(--gold-primary), var(--gold-secondary), var(--gold-primary)) border-box;
        border: 1px solid transparent;
      }

      /* Queue number font-size utility classes (digunakan untuk card terlewat) */
      .queue-number.text-xl {
        font-size: clamp(3rem, 26vh, 17rem);
      }
      .queue-number.text-lg {
        font-size: clamp(2.5rem, 17vh, 11rem);
      }
      .queue-number.text-md {
        font-size: clamp(1.5rem, 10vh, 6rem);
      }
      .queue-number.text-sm {
        font-size: clamp(1.25rem, 7vh, 4rem);
      }
      .queue-number.text-xs {
        font-size: clamp(1rem, 5vh, 3rem);
      }
    </style>
  </head>
  <body>
    <!-- Decorative Elements -->
    <div class="gold-decoration top-left"></div>
    <div class="gold-decoration bottom-right"></div>

    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="row align-items-center justify-content-beetween">
          <div class="col-md-6">
            <div class="logo-container">
              <img src="img/Melati.jfif" alt="Logo" class="logo gold-shimmer" />
              <h1 class="brand-name"><a href="admin.html" class="text-decoration-none">Melati Gold Shop</a></h1>
            </div>
          </div>
          <div class="col-md-6 d-flex justify-content-end align-items-center">
            <div class="date-time">
              <div class="current-date" id="current-date"></div>
              <div class="d-flex align-items-center gap-3">
                <div class="current-time" id="current-time"></div>
                <div class="display-promosi">
                  <a href="promosi-display.html" class="text-decoration-none">
                    <i class="fas fa-desktop text-white fs-2" title="Display Promosi"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="container-fluid" style="max-width: 1800px; margin: 0 auto">
      <!-- Page Title -->
      <div class="page-title" data-aos="fade-up" data-aos-delay="100">
        <h1>ANTRIAN PELAYANAN</h1>
      </div>

      <!-- Queue Cards -->
      <div id="cards-row" class="row justify-content-center align-items-stretch mt-0 g-2 layout-two-col">
        <!-- Current Queue Card -->
        <div class="col-12 col-md-5" id="current-card-wrapper" data-aos="fade-up" data-aos-delay="300">
          <div class="queue-card card-current gold-border">
            <div class="queue-card-header">
              <h1>SEDANG DILAYANI</h1>
            </div>
            <div class="queue-card-body">
              <div class="queue-number active" id="queueNumber">-</div>
            </div>
          </div>
        </div>

        <!-- Delayed Queue Card (hanya tampil jika ada antrian terlewat) -->
        <div
          class="col-12 col-md-4"
          id="delayed-card-wrapper"
          style="display: none"
          data-aos="fade-up"
          data-aos-delay="350"
        >
          <div class="queue-card card-delayed gold-border">
            <div class="queue-card-header">
              <h1>ANTRIAN TERLEWAT</h1>
            </div>
            <div class="queue-card-body">
              <div class="queue-number" id="delayQueueNumber">-</div>
            </div>
          </div>
        </div>

        <!-- Next Queue Card -->
        <div class="col-12 col-md-5" id="next-card-wrapper" data-aos="fade-up" data-aos-delay="400">
          <div class="queue-card card-next gold-border">
            <div class="queue-card-header">
              <h1 id="next-card-header">AKAN DIPANGGIL</h1>
            </div>
            <div class="queue-card-body">
              <div class="queue-number" id="nextQueueNumber">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="elegant-divider" data-aos="fade-up" data-aos-delay="500"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 80px">
          <div class="col-auto">
            <p class="fs-3 mb-0">&copy; 2026 Melati Gold Shop. All rights reserved.</p>
          </div>
        </div>
      </div>
    </footer>

    <!-- AOS Animation Library -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script type="module" src="js/display.js"></script>
    <script>
      function updateDateTime() {
        const now = new Date();
        const dateElement = document.getElementById("current-date");
        const timeElement = document.getElementById("current-time");

        if (dateElement) {
          dateElement.textContent = now.toLocaleDateString("id-ID", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        }
        if (timeElement) {
          timeElement.textContent = now.toLocaleTimeString("id-ID");
        }
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);

      function adjustDelayedQueueFontSize(text) {
        const el = document.getElementById("delayQueueNumber");
        if (!el) return;
        el.classList.remove("text-xs", "text-sm", "text-md", "text-lg", "text-xl");
        const count = String(text)
          .split(",")
          .filter((s) => s.trim()).length;
        if (count <= 1) el.classList.add("text-xl");
        else if (count <= 2) el.classList.add("text-lg");
        else if (count <= 3) el.classList.add("text-md");
        else if (count <= 4) el.classList.add("text-sm");
        else el.classList.add("text-xs");
      }

      // Animasi saat nomor antrian berubah
      function animateQueueChange(elementId) {
        const element = document.getElementById(elementId);
        if (element) {
          element.classList.add("active");
          setTimeout(() => element.classList.remove("active"), 2000);
        }
      }

      // Firebase integration
      document.addEventListener("DOMContentLoaded", function () {
        import("https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js").then((firebaseApp) => {
          import("https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js").then((firebaseDB) => {
            import("./js/configFirebase.js")
              .then((config) => {
                const { getDatabase, ref, onValue } = firebaseDB;
                const database = getDatabase(config.app);

                // Listen for queue updates
                onValue(ref(database, "queue"), (snapshot) => {
                  const data = snapshot.val();
                  if (!data) return;

                  updateQueueElement("queueNumber", data.currentQueue);
                  updateQueueElement("nextQueueNumber", data.nextQueue);

                  // Normalkan missedQueue dari Firebase (array/object/string → string tampilan)
                  // Card "ANTRIAN TERLEWAT" di display membaca missedQueue (Handle Terlewat di admin)
                  let delayedText = null;
                  if (data.missedQueue) {
                    if (Array.isArray(data.missedQueue)) {
                      const arr = data.missedQueue.filter((v) => v);
                      if (arr.length > 0) delayedText = arr.join(", ");
                    } else if (typeof data.missedQueue === "object") {
                      const arr = Object.values(data.missedQueue).filter((v) => v);
                      if (arr.length > 0) delayedText = arr.join(", ");
                    } else if (typeof data.missedQueue === "string" && data.missedQueue.trim()) {
                      delayedText = data.missedQueue.trim();
                    }
                  }

                  // Tampilkan/sembunyikan card antrian terlewat
                  const delayedWrapper = document.getElementById("delayed-card-wrapper");
                  const currentWrapper = document.getElementById("current-card-wrapper");
                  const nextWrapper = document.getElementById("next-card-wrapper");
                  const cardsRow = document.getElementById("cards-row");
                  const nextCardHeader = document.getElementById("next-card-header");
                  if (delayedText) {
                    updateQueueElement("delayQueueNumber", delayedText);
                    adjustDelayedQueueFontSize(delayedText);
                    if (delayedWrapper) delayedWrapper.style.display = "";
                    if (cardsRow) cardsRow.classList.remove("layout-two-col");
                    if (nextCardHeader) nextCardHeader.textContent = "ANTRIAN BERIKUTNYA";
                    // Saat 3 card: masing-masing col-md-4
                    if (currentWrapper) {
                      currentWrapper.classList.remove("col-md-5");
                      currentWrapper.classList.add("col-md-4");
                    }
                    if (nextWrapper) {
                      nextWrapper.classList.remove("col-md-5");
                      nextWrapper.classList.add("col-md-4");
                    }
                  } else {
                    if (delayedWrapper) delayedWrapper.style.display = "none";
                    if (cardsRow) cardsRow.classList.add("layout-two-col");
                    if (nextCardHeader) nextCardHeader.textContent = "AKAN DIPANGGIL";
                    // Saat 2 card: masing-masing col-md-5
                    if (currentWrapper) {
                      currentWrapper.classList.remove("col-md-4");
                      currentWrapper.classList.add("col-md-5");
                    }
                    if (nextWrapper) {
                      nextWrapper.classList.remove("col-md-4");
                      nextWrapper.classList.add("col-md-5");
                    }
                  }
                });

                // Helper function to update queue elements
                function updateQueueElement(elementId, value) {
                  const element = document.getElementById(elementId);
                  if (element && value && element.textContent !== String(value)) {
                    element.textContent = value;
                    animateQueueChange(elementId);
                  }
                }
              })
              .catch((error) => console.error("Error loading Firebase:", error));
          });
        });
      });

      // Initialize AOS animation
      AOS.init({ duration: 800, once: false });
    </script>
  </body>
</html>
